<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Record Match Result — CRIKTRACK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div data-layout="nav"></div>

    <main id="main">
      <section class="section">
        <div class="container" style="max-width: 960px">
          <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small">
              <li class="breadcrumb-item">
                <a class="link-primary" href="tournament-detail.html"
                  >UWA Social League</a
                >
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Record result
              </li>
            </ol>
          </nav>
          <h1 class="mb-2">Enter / edit match result</h1>
          <p class="lead mb-4">Crusaders vs Knights — 12 Apr 2026</p>

          <form
            class="ctm-card"
            data-ctm-validate
            data-redirect="match-scorecard.html"
            novalidate
          >
            <!-- Match meta -->
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <label for="match_date" class="form-label">Match date</label>
                <input
                  type="date"
                  id="match_date"
                  name="match_date"
                  class="form-control"
                  required
                  value="2026-04-12"
                />
                <div class="form-hint-error" aria-live="polite"></div>
              </div>
              <div class="col-md-4">
                <label for="venue" class="form-label">Venue</label>
                <input
                  type="text"
                  id="venue"
                  name="venue"
                  class="form-control"
                  value="UWA Sports Park, Oval 3"
                />
              </div>
              <div class="col-md-4">
                <label for="toss" class="form-label">Toss winner</label>
                <select id="toss" name="toss" class="form-select">
                  <option value="A" selected>Crusaders — chose to bat</option>
                  <option value="B">Knights — chose to bowl</option>
                </select>
              </div>
            </div>

            <ul class="nav nav-pills nav-pills-ctm gap-2 mb-3" role="tablist">
              <li class="nav-item">
                <button
                  class="nav-link active"
                  data-bs-toggle="pill"
                  data-bs-target="#inn1"
                  type="button"
                  role="tab"
                >
                  Innings 1 — Crusaders
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  data-bs-toggle="pill"
                  data-bs-target="#inn2"
                  type="button"
                  role="tab"
                >
                  Innings 2 — Knights
                </button>
              </li>
              <li class="nav-item">
                <button
                  class="nav-link"
                  data-bs-toggle="pill"
                  data-bs-target="#result"
                  type="button"
                  role="tab"
                >
                  Result
                </button>
              </li>
            </ul>

            <div class="tab-content">
              <!-- Innings 1 -->
              <div class="tab-pane fade show active" id="inn1" role="tabpanel">
                <div class="row g-3 mb-3">
                  <div class="col-md-3">
                    <label class="form-label">Total runs</label
                    ><input
                      type="number"
                      name="inn1_runs"
                      class="form-control"
                      value="182"
                      min="0"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Wickets</label
                    ><input
                      type="number"
                      name="inn1_wkts"
                      class="form-control"
                      value="6"
                      min="0"
                      max="10"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Overs bowled</label
                    ><input
                      type="number"
                      name="inn1_overs"
                      class="form-control"
                      value="20"
                      step="0.1"
                      min="0"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Extras</label
                    ><input
                      type="number"
                      name="inn1_extras"
                      class="form-control"
                      value="5"
                      min="0"
                    />
                  </div>
                </div>

                <h3
                  class="h6 mb-2"
                  style="font-family: var(--ctm-font-body); font-weight: 700"
                >
                  Batting
                </h3>
                <div id="batting-1" class="d-flex flex-column gap-2 mb-3">
                  <div class="row g-2 align-items-center">
                    <div class="col-md-4">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Batter name"
                        value="Aarav Patel"
                        aria-label="Batter"
                      />
                    </div>
                    <div class="col-md-3">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Dismissal"
                        value="c Rao b Khan"
                        aria-label="Dismissal"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Runs"
                        value="78"
                        aria-label="Runs"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Balls"
                        value="52"
                        aria-label="Balls"
                      />
                    </div>
                    <div class="col-md-1">
                      <button
                        type="button"
                        class="btn btn-ctm-ghost w-100"
                        data-remove-row
                        aria-label="Remove"
                      >
                        ×
                      </button>
                    </div>
                  </div>
                  <div class="row g-2 align-items-center">
                    <div class="col-md-4">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Batter name"
                        value="James Butler"
                        aria-label="Batter"
                      />
                    </div>
                    <div class="col-md-3">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Dismissal"
                        value="b Khan"
                        aria-label="Dismissal"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Runs"
                        value="45"
                        aria-label="Runs"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Balls"
                        value="38"
                        aria-label="Balls"
                      />
                    </div>
                    <div class="col-md-1">
                      <button
                        type="button"
                        class="btn btn-ctm-ghost w-100"
                        data-remove-row
                        aria-label="Remove"
                      >
                        ×
                      </button>
                    </div>
                  </div>
                  <div
                    class="row g-2 align-items-center"
                    data-row-template
                    style="display: none"
                  >
                    <div class="col-md-4">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Batter name"
                        aria-label="Batter"
                      />
                    </div>
                    <div class="col-md-3">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Dismissal"
                        aria-label="Dismissal"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Runs"
                        aria-label="Runs"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Balls"
                        aria-label="Balls"
                      />
                    </div>
                    <div class="col-md-1">
                      <button
                        type="button"
                        class="btn btn-ctm-ghost w-100"
                        data-remove-row
                        aria-label="Remove"
                      >
                        ×
                      </button>
                    </div>
                  </div>
                </div>
                <button
                  type="button"
                  class="btn btn-ctm-ghost btn-sm mb-3"
                  data-add-row
                  data-target="#batting-1"
                >
                  + Add batter
                </button>

                <h3
                  class="h6 mb-2"
                  style="font-family: var(--ctm-font-body); font-weight: 700"
                >
                  Bowling (Knights)
                </h3>
                <div id="bowling-1" class="d-flex flex-column gap-2 mb-3">
                  <div class="row g-2 align-items-center">
                    <div class="col-md-4">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Bowler"
                        value="Imran Khan"
                        aria-label="Bowler"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        step="0.1"
                        class="form-control"
                        placeholder="Overs"
                        value="4"
                        aria-label="Overs"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Runs"
                        value="28"
                        aria-label="Runs conceded"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Wkts"
                        value="3"
                        aria-label="Wickets"
                      />
                    </div>
                    <div class="col-md-2">
                      <button
                        type="button"
                        class="btn btn-ctm-ghost w-100"
                        data-remove-row
                        aria-label="Remove"
                      >
                        Remove
                      </button>
                    </div>
                  </div>
                  <div
                    class="row g-2 align-items-center"
                    data-row-template
                    style="display: none"
                  >
                    <div class="col-md-4">
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Bowler"
                        aria-label="Bowler"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        step="0.1"
                        class="form-control"
                        placeholder="Overs"
                        aria-label="Overs"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Runs"
                        aria-label="Runs conceded"
                      />
                    </div>
                    <div class="col-md-2">
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Wkts"
                        aria-label="Wickets"
                      />
                    </div>
                    <div class="col-md-2">
                      <button
                        type="button"
                        class="btn btn-ctm-ghost w-100"
                        data-remove-row
                        aria-label="Remove"
                      >
                        Remove
                      </button>
                    </div>
                  </div>
                </div>
                <button
                  type="button"
                  class="btn btn-ctm-ghost btn-sm"
                  data-add-row
                  data-target="#bowling-1"
                >
                  + Add bowler
                </button>
              </div>

              <!-- Innings 2 -->
              <div class="tab-pane fade" id="inn2" role="tabpanel">
                <div class="row g-3 mb-3">
                  <div class="col-md-3">
                    <label class="form-label">Total runs</label
                    ><input
                      type="number"
                      name="inn2_runs"
                      class="form-control"
                      value="165"
                      min="0"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Wickets</label
                    ><input
                      type="number"
                      name="inn2_wkts"
                      class="form-control"
                      value="9"
                      min="0"
                      max="10"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Overs bowled</label
                    ><input
                      type="number"
                      name="inn2_overs"
                      class="form-control"
                      value="20"
                      step="0.1"
                      min="0"
                    />
                  </div>
                  <div class="col-md-3">
                    <label class="form-label">Extras</label
                    ><input
                      type="number"
                      name="inn2_extras"
                      class="form-control"
                      value="12"
                      min="0"
                    />
                  </div>
                </div>
                <p class="muted small">
                  Add batter and bowler rows just like the first innings —
                  fields hidden here for brevity.
                </p>
              </div>

              <!-- Result -->
              <div class="tab-pane fade" id="result" role="tabpanel">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="winner" class="form-label">Winner</label>
                    <select
                      id="winner"
                      name="winner"
                      class="form-select"
                      required
                    >
                      <option value="">Choose a team…</option>
                      <option value="A" selected>Crawley Crusaders</option>
                      <option value="B">Nedlands Knights</option>
                      <option value="T">Tie / No result</option>
                    </select>
                    <div class="form-hint-error" aria-live="polite"></div>
                  </div>
                  <div class="col-md-6">
                    <label for="margin" class="form-label">Margin</label>
                    <input
                      type="text"
                      id="margin"
                      name="margin"
                      class="form-control"
                      value="17 runs"
                      placeholder="e.g. 17 runs, 6 wickets"
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="potm" class="form-label"
                      >Player of the match</label
                    >
                    <input
                      type="text"
                      id="potm"
                      name="potm"
                      class="form-control"
                      value="Aarav Patel"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
              <a href="tournament-detail.html" class="btn btn-ctm-ghost"
                >Cancel</a
              >
              <button type="submit" class="btn btn-ctm-primary">
                Save result
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <div data-layout="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/mockdata.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
