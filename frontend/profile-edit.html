<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit profile — CRIKTRACK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div data-layout="nav"></div>

    <main id="main">
      <section class="section">
        <div class="container" style="max-width: 680px">
          <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb small">
              <li class="breadcrumb-item">
                <a class="link-primary" href="profile.html">Profile</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">Edit</li>
            </ol>
          </nav>
          <h1 class="mb-2">Edit your profile</h1>
          <p class="lead mb-4">Update how other players see you.</p>

          <form
            class="ctm-card"
            data-ctm-validate
            data-redirect="profile.html"
            novalidate
          >
            <div class="d-flex align-items-center gap-3 mb-4">
              <span class="avatar xl">CZ</span>
              <div>
                <label class="form-label mb-1">Avatar</label>
                <div class="d-flex gap-2">
                  <button type="button" class="btn btn-ctm-ghost btn-sm">
                    Upload image
                  </button>
                  <button type="button" class="btn btn-ctm-ghost btn-sm">
                    Remove
                  </button>
                </div>
                <small class="form-text"
                  >PNG or JPG, square image recommended (max 2 MB).</small
                >
              </div>
            </div>

            <div class="mb-3">
              <label for="display_name" class="form-label">Display name</label>
              <input
                type="text"
                id="display_name"
                name="display_name"
                class="form-control"
                required
                value="Cheng Zhang"
              />
              <div class="form-hint-error" aria-live="polite"></div>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                required
                value="cheng@example.com"
              />
              <div class="form-hint-error" aria-live="polite"></div>
            </div>
            <div class="mb-3">
              <label for="location" class="form-label"
                >Location <span class="muted small">(optional)</span></label
              >
              <input
                type="text"
                id="location"
                name="location"
                class="form-control"
                value="Perth, WA"
              />
            </div>
            <div class="mb-4">
              <label for="bio" class="form-label"
                >Bio <span class="muted small">(optional)</span></label
              >
              <textarea
                id="bio"
                name="bio"
                class="form-control"
                rows="4"
                maxlength="240"
              >
Club cricketer from Perth. Organiser of the UWA Social League. Enjoys messy run-outs and dubious LBW decisions.</textarea
              >
              <small class="form-text">Up to 240 characters.</small>
            </div>

            <div class="d-flex gap-2 justify-content-end">
              <a href="profile.html" class="btn btn-ctm-ghost">Cancel</a>
              <button type="submit" class="btn btn-ctm-primary">
                Save changes
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <div data-layout="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/mockdata.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
