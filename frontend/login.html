<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in — CRIKTRACK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div data-layout="nav"></div>

    <main id="main" class="auth-wrapper">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="auth-card">
              <div class="text-center mb-4">
                <h1>Welcome back</h1>
                <p class="muted m-0">Log in to manage your tournaments.</p>
              </div>
              <form data-ctm-validate data-redirect="dashboard.html" novalidate>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    required
                    autocomplete="email"
                    placeholder="you@example.com"
                  />
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div class="mb-2">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    required
                    autocomplete="current-password"
                    minlength="8"
                  />
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <div class="form-check">
                    <input
                      type="checkbox"
                      id="remember"
                      name="remember"
                      class="form-check-input"
                    />
                    <label for="remember" class="form-check-label small"
                      >Remember me</label
                    >
                  </div>
                  <a href="#" class="small link-primary">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-ctm-primary w-100 btn-lg">
                  Log in
                </button>
              </form>
              <p class="text-center muted mt-4 mb-0 small">
                New to CRIKTRACK?
                <a class="link-primary" href="register.html"
                  >Create an account</a
                >.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-layout="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/mockdata.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
