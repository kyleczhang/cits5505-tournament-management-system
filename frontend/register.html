<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up — CRIKTRACK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div data-layout="nav"></div>

    <main id="main" class="auth-wrapper">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="auth-card">
              <div class="text-center mb-4">
                <h1>Create an account</h1>
                <p class="muted m-0">
                  Start managing your cricket tournament in minutes.
                </p>
              </div>
              <form data-ctm-validate data-redirect="dashboard.html" novalidate>
                <div class="mb-3">
                  <label for="name" class="form-label">Full name</label>
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control"
                    required
                    autocomplete="name"
                    placeholder="e.g. Aarav Patel"
                  />
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    required
                    autocomplete="email"
                    placeholder="you@example.com"
                  />
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Password</label>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    required
                    autocomplete="new-password"
                    minlength="8"
                    aria-describedby="pw-hint"
                  />
                  <div id="pw-hint" class="form-text">
                    At least 8 characters. Use a mix of letters and numbers.
                  </div>
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div class="mb-4">
                  <label for="confirm_password" class="form-label"
                    >Confirm password</label
                  >
                  <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    class="form-control"
                    required
                    autocomplete="new-password"
                  />
                  <div class="form-hint-error" aria-live="polite"></div>
                </div>
                <div class="form-check mb-4">
                  <input
                    type="checkbox"
                    id="terms"
                    name="terms"
                    class="form-check-input"
                    required
                  />
                  <label for="terms" class="form-check-label small"
                    >I agree to the
                    <a href="#" class="link-primary">terms of service</a> and
                    <a href="#" class="link-primary">privacy policy</a>.</label
                  >
                </div>
                <button type="submit" class="btn btn-ctm-primary w-100 btn-lg">
                  Create account
                </button>
              </form>
              <p class="text-center muted mt-4 mb-0 small">
                Already have an account?
                <a class="link-primary" href="login.html">Log in</a>.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div data-layout="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/mockdata.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
