{% extends "base.html" %}

{% block content %}
  <section class="section">
    <div class="container text-center">
      <div class="ctm-card mx-auto" style="max-width: 560px; padding: 3rem 2rem;">
        <div style="font-family: var(--ctm-font-heading); font-size: 5rem; line-height: 1; color: var(--ctm-primary);">{{ status_code }}</div>
        <h1 class="mt-3 mb-2">{{ heading }}</h1>
        <p class="muted mb-4">{{ message }}</p>
        <a href="{{ url_for('landing') }}" class="btn btn-ctm-primary">Back to home</a>
      </div>
    </div>
  </section>
{% endblock %}
