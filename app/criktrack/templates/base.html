<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{% block meta_description %}CRIKTRACK — a cricket tournament management system for organisers, clubs and casual players.{% endblock %}" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>{% block title %}CRIKTRACK — Cricket Tournament Management{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
    {% block head_extra %}{% endblock %}
  </head>
  <body data-ctm-role="{{ current_user.role.value if current_user.is_authenticated else 'user' }}">
    <a href="#main" class="skip-link">Skip to main content</a>
    {% include "partials/nav.html" %}
    {% include "partials/flash_messages.html" %}

    <main id="main">
      {% block content %}{% endblock %}
    </main>

    {% include "partials/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>window.CTM_CONFIG = {{ ctm_config | tojson }};</script>
    {% block scripts %}{% endblock %}
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
