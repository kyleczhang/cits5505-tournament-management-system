<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Tournament — CRIKTRACK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="styless.css" rel="stylesheet">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>

<main id="main">
  <section class="section">
    <div class="container" style="max-width:860px;">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb small">
          <li class="breadcrumb-item"><a class="link-primary" href="dashboard.html">Dashboard</a></li>
          <li class="breadcrumb-item active" aria-current="page">Create tournament</li>
        </ol>
      </nav>
      <h1 class="mb-2">Create a new tournament</h1>
      <p class="lead mb-4">Set up the basics — you can add teams and generate fixtures next.</p>

      <form class="ctm-card" data-ctm-validate data-redirect="tournament-detail.html" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label for="name" class="form-label">Tournament name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="e.g. UWA Social League 2026">
            <div class="form-hint-error" aria-live="polite"></div>
          </div>
          <div class="col-md-6">
            <label for="start_date" class="form-label">Start date</label>
            <input type="date" id="start_date" name="start_date" class="form-control" required>
            <div class="form-hint-error" aria-live="polite"></div>
          </div>
          <div class="col-md-6">
            <label for="format" class="form-label">Format</label>
            <select id="format" name="format" class="form-select" required>
              <option value="">Choose a format…</option>
              <option value="knockout">Knockout</option>
              <option value="round_robin">Round-robin</option>
              <option value="group_stage">Group stage</option>
            </select>
            <div class="form-hint-error" aria-live="polite"></div>
          </div>
          <div class="col-md-6">
            <label for="num_teams" class="form-label">Number of teams</label>
            <input type="number" id="num_teams" name="num_teams" class="form-control" required min="2" max="32" value="6">
            <div class="form-hint-error" aria-live="polite"></div>
          </div>
          <div class="col-md-6">
            <label for="overs" class="form-label">Overs per innings</label>
            <input type="number" id="overs" name="overs" class="form-control" min="5" max="50" value="20">
            <div class="form-text">Typical: 20 (T20), 50 (ODI), 10 (Sixes).</div>
          </div>
          <div class="col-12">
            <label for="description" class="form-label">Description <span class="muted small">(optional)</span></label>
            <textarea id="description" name="description" class="form-control" rows="3" placeholder="Tell visitors about this tournament…"></textarea>
          </div>
        </div>

        <hr class="my-4">

        <h2 class="h5 mb-3" style="font-family:var(--ctm-font-body); font-weight:700;">Teams</h2>
        <p class="small muted mb-3">Add the teams that will play. You'll be able to assign players on the next step.</p>
        <div id="teams-list" class="d-flex flex-column gap-2 mb-3">
          <div class="input-group">
            <span class="input-group-text">1</span>
            <input type="text" class="form-control" placeholder="Team name" value="Crawley Crusaders">
          </div>
          <div class="input-group">
            <span class="input-group-text">2</span>
            <input type="text" class="form-control" placeholder="Team name" value="Nedlands Knights">
          </div>
          <div class="input-group" data-row-template style="display:none;">
            <span class="input-group-text">•</span>
            <input type="text" class="form-control" placeholder="Team name">
            <button type="button" class="btn btn-ctm-ghost" data-remove-row aria-label="Remove team">×</button>
          </div>
        </div>
        <button type="button" class="btn btn-ctm-ghost btn-sm" data-add-row data-target="#teams-list">+ Add another team</button>

        <div class="d-flex gap-2 justify-content-end mt-4">
          <a href="dashboard.html" class="btn btn-ctm-ghost">Cancel</a>
          <button type="submit" class="btn btn-ctm-primary">Create &amp; continue</button>
        </div>
      </form>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
